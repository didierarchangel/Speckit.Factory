[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "speckit-factory"
version = "0.1.0"
description = "Constitutional DevOps AI Framework"
authors = [{name = "Didier KAZITALA"}]
dependencies = [
    "click~=8.1.7",
    "langchain~=0.3.0",
    "langchain-community~=0.3.0",
    "pydantic~=2.10.0",
    "langgraph~=0.2.0",
    "langchain-google-genai~=2.0.0",
    "langchain-anthropic~=0.2.0",
    "langchain-openai~=0.2.0",
    "python-dotenv~=1.0.1",
]

[tool.setuptools]
packages = ["core", "utils", "agents", "protocols", "templates"]
py-modules = ["speckit_cli"]
include-package-data = true

[tool.setuptools.package-data]
agents = ["*.prompt"]
protocols = ["*.md"]
templates = ["*.md"]

[project.scripts]
speckit = "speckit_cli:cli"